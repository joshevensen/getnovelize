{{ partial:pages/partials/header }}
{{ partial:pages/partials/hero }}

<!-- FAQ -->
<div class="bg-gray-50">
  <div class="max-w-7xl mx-auto py-12 px-4 sm:py-16 sm:px-6 lg:px-8">
    <div class="max-w-3xl mx-auto divide-y-2 divide-gray-200">
      <dl class="mt-6 space-y-6 divide-y divide-gray-200">
        {{ collection:faq }}
        <div class="pt-6">
          <dt class="text-lg">
            <!-- Expand/collapse question button -->
            <button class="text-left w-full flex justify-between items-start text-gray-400">
              <span class="font-medium text-gray-900">
                {{ title }}
              </span>
              <span class="ml-6 h-7 flex items-center">
                <!--
                  Heroicon name: chevron-down

                  Open: "-rotate-180", Closed: "rotate-0"
                -->
                <svg class="-rotate-180 h-6 w-6 transform" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
              </span>
            </button>
          </dt>
          <dd class="mt-2 pr-12">
            <p class="text-base text-gray-500">
              {{ answer }}
            </p>
          </dd>
        </div>
        {{ /collection:faq }}
      </dl>
    </div>
  </div>
</div>

{{ partial:pages/partials/cta }}
{{ partial:pages/partials/footer }}
