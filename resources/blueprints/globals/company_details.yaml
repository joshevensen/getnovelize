sections:
  main:
    display: Main
    fields:
      -
        handle: logo
        field:
          mode: grid
          container: assets
          restrict: false
          allow_uploads: true
          max_files: 1
          display: Logo
          type: assets
          icon: assets
          listable: hidden
      -
        handle: name
        field:
          input_type: text
          antlers: false
          display: Name
          type: text
          icon: text
          instructions: 'used in places like logo alt text'
          listable: hidden
      -
        handle: call_to_action_button_text
        field:
          input_type: text
          antlers: false
          display: 'Call To Action Button Text'
          type: text
          icon: text
          listable: hidden
      -
        handle: email_address
        field:
          input_type: text
          antlers: false
          display: 'Email Address'
          type: text
          icon: text
          listable: hidden
      -
        handle: login_link
        field:
          display: 'Login Link'
          type: link
          icon: link
          listable: hidden
      -
        handle: registration_link
        field:
          display: 'Registration Link'
          type: link
          icon: link
          listable: hidden
